spring.application.name=backend

# Carga las credenciales locales desde backend/.env (formato properties).
# Soporte NATIVO de Spring Boot (no requiere librerías). `optional:` = no falla si no existe.
# Se listan dos rutas para cubrir el working-dir (backend/ o raíz del repo).
spring.config.import=optional:file:.env[.properties],optional:file:backend/.env[.properties]
spring.datasource.url=jdbc:postgresql://localhost:5434/sport_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Habilitar PostGIS antes de que Hibernate ejecute el DDL
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=false

server.port=8080

# === Email (SMTP Gmail) — credenciales por variable de entorno, nunca en el repo ===
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# === Verificación de email ===
sportsync.verificacion.from=${MAIL_FROM:no-reply@sportsync.local}
sportsync.verificacion.expiracion-minutos=15
sportsync.verificacion.max-intentos=5
sportsync.verificacion.reenvio-segundos=60
# dev: si no hay SMTP configurado (MAIL_USERNAME vacío), el código se loguea en consola
sportsync.verificacion.modo-dev-log=${VERIF_DEV_LOG:true}

# === Google OAuth (Etapa 1.4) ===
sportsync.oauth.google.client-id=${GOOGLE_OAUTH_CLIENT_ID:}

# === JWT (mover el secreto hardcodeado a env) ===
sportsync.jwt.secret=${JWT_SECRET:sportsync-clave-secreta-muy-larga-para-hmac-256}

# === Reservas: antelación mínima para reservar un turno (minutos) ===
sportsync.reservas.antelacion-minima-minutos=30

# === Mercado Pago (Checkout Pro) ===
# Access token de sandbox (TEST-...). Por variable de entorno, nunca en el repo.
sportsync.mp.access-token=${MP_ACCESS_TOKEN:}
# URL pública (ngrok) a la que Mercado Pago manda el webhook de notificaciones.
sportsync.mp.webhook-url=${MP_WEBHOOK_URL:}
# Base del frontend para las back_urls (a dónde vuelve el usuario tras pagar).
sportsync.frontend.url=${FRONTEND_URL:http://localhost:5173}
# Modo simulación (dev): si es true, no llama a MP — usa un checkout local con resultado manual.
sportsync.pagos.simulacion=${PAGOS_SIMULACION:false}

# ?? Precios Inteligentes ??????????????????????????????????????????
sportsync.precios.min-reservas=5
sportsync.precios.ventana-semanas=4
sportsync.precios.umbral=0.75
sportsync.precios.max-descuento=0.30
sportsync.precios.paso-ajuste=0.02
sportsync.precios.hora-apertura=08:00
sportsync.precios.hora-cierre=22:00
sportsync.precios.duracion-slot=60